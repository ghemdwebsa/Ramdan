<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوازير رمضان</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fdfaf5; --primary-color: #8d7b68; --accent-color: #d7c0ae; --text-color: #4a4036; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; }
        .container { width: 90%; max-width: 500px; background: white; padding: 40px 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(141, 123, 104, 0.1); margin-top: 60px; text-align: center; border: 1px solid var(--accent-color); }
        h1 { font-family: 'Aref Ruqaa', serif; font-size: 3rem; color: var(--primary-color); margin-bottom: 20px; }
        
        .option-btn { 
            display: block; 
            width: 100%; 
            margin: 15px 0; 
            background: #fff; 
            color: #4a4036 !important; 
            border: 2px solid var(--accent-color); 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-family: 'Tajawal'; 
            font-weight: bold;
            transition: 0.3s;
        }
        .option-btn:hover { background-color: var(--accent-color); color: white !important; }
        
        button.main-btn { background-color: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-family: 'Tajawal'; }
        input[type="text"] { padding: 15px; width: 80%; border: 2px solid var(--accent-color); border-radius: 12px; margin-bottom: 20px; text-align: center; font-family: 'Tajawal'; font-size: 1rem; }
        .hidden { display: none; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--accent-color); color: var(--text-color); }
        .footer-tag { font-size: 10px; color: #b5a492; margin-top: auto; padding: 25px; }
    </style>
</head>
<body>

    <div class="container" id="page-start">
        <h1>فوازير رمضان</h1>
        <input type="text" id="playerName" placeholder="اكتب اسمك للمشاركة">
        <br>
        <button class="main-btn" onclick="startQuiz()">ابدأ الآن</button>
        <p onclick="showLeaderboard()" style="cursor:pointer; text-decoration:underline; color:var(--primary-color); margin-top:20px;">لوحة الصدارة</p>
    </div>

    <div class="container hidden" id="page-quiz">
        <h2 id="questionText" style="color: var(--primary-color); margin-bottom: 30px;"></h2>
        <div id="optionsContainer"></div>
        <p id="progress" style="margin-top:20px; font-weight:bold;"></p>
    </div>

    <div class="container hidden" id="page-result">
        <h2>🏆 انتهت المسابقة!</h2>
        <p id="finalScore" style="font-size: 2.5rem; margin: 20px 0; color: var(--primary-color);"></p>
        <button class="main-btn" onclick="location.reload()">العودة للرئيسية</button>
    </div>

    <div class="container hidden" id="page-leaderboard">
        <h2>أعلى النقاط 🏆</h2>
        <table>
            <thead><tr><th>المتسابق</th><th>النقاط</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <br>
        <button class="main-btn" onclick="location.reload()">رجوع</button>
    </div>

    <div class="footer-tag">By @ghemd.sa</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast } 
        from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

        // تم تحديث المفتاح إلى المفتاح الجديد والمحمي
        const firebaseConfig = {
            apiKey: "AIzaSyCKrNmmMj2oeLTWdP4UIbYUFbwupta5KOI",
            authDomain: "ramadan-8fd2a.firebaseapp.com",
            projectId: "ramadan-8fd2a",
            databaseURL: "https://ramadan-8fd2a-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const questions = [
            { q: "كم عدد سور القرآن الكريم؟", a: ["110", "114", "120"], c: 1 },
            { q: "من هو أول من آمن من الرجال؟", a: ["أبو بكر الصديق", "عمر بن الخطاب", "علي بن أبي طالب"], c: 0 },
            { q: "ما هي أطول سورة في القرآن الكريم؟", a: ["البقرة", "آل عمران", "النساء"], c: 0 },
            { q: "في أي شهر نزل القرآن الكريم؟", a: ["شعبان", "رمضان", "رجب"], c: 1 },
            { q: "من هو الملقب بـ 'ذو النورين'؟", a: ["عثمان بن عفان", "علي بن أبي طالب", "خالد بن الوليد"], c: 0 },
            { q: "كم عدد أركان الإسلام؟", a: ["أربعة", "خمسة", "ستة"], c: 1 },
            { q: "ما هي السورة التي تسمى 'عروس القرآن'؟", a: ["يس", "الرحمن", "الملك"], c: 1 },
            { q: "من هو النبي الذي ابتلعه الحوت؟", a: ["يونس عليه السلام", "يوسف عليه السلام", "نوح عليه السلام"], c: 0 },
            { q: "ما هي أعظم آية في القرآن الكريم؟", a: ["آية الكرسي", "آية الدين", "أول سورة الفاتحة"], c: 0 },
            { q: "من هو أول مؤذن في الإسلام؟", a: ["بلال بن رباح", "عمار بن ياسر", "أنس بن مالك"], c: 0 },
            { q: "كم مرة ذكر شهر رمضان في القرآن؟", a: ["مرة واحدة", "مرتين", "ثلاث مرات"], c: 0 },
            { q: "ما هي القبلة الأولى للمسلمين؟", a: ["المسجد النبوي", "المسجد الأقصى", "المسجد الحرام"], c: 1 },
            { q: "من هو خاتم الأنبياء والمرسلين؟", a: ["عيسى عليه السلام", "موسى عليه السلام", "محمد ﷺ"], c: 2 },
            { q: "كم عدد أجزاء القرآن الكريم؟", a: ["20 جزءاً", "30 جزءاً", "40 جزءاً"], c: 1 },
            { q: "ما هي أقصر سورة في القرآن الكريم؟", a: ["الإخلاص", "الكوثر", "النصر"], c: 1 },
            { q: "من هي أم المؤمنين الأولى؟", a: ["عائشة بنت أبي بكر", "خديجة بنت خويلد", "حفصة بنت عمر"], c: 1 },
            { q: "في أي مدينة توفي الرسول ﷺ؟", a: ["مكة المكرمة", "المدينة المنورة", "الطائف"], c: 1 },
            { q: "ما هو لقب حمزة بن عبد المطلب؟", a: ["الفاروق", "أسد الله", "سيف الله المسلول"], c: 1 },
            { q: "من هو الصحابي الذي اهتز لموته عرش الرحمن؟", a: ["سعد بن معاذ", "خالد بن الوليد", "أبو عبيدة"], c: 0 },
            { q: "كم عدد الصلوات المفروضة في اليوم؟", a: ["3 صلوات", "5 صلوات", "7 صلوات"], c: 1 }
        ];

        let current = 0; let score = 0; let name = "";

        window.startQuiz = () => {
            name = document.getElementById('playerName').value;
            if (!name) return alert("اكتب اسمك أولاً!");
            document.getElementById('page-start').classList.add('hidden');
            document.getElementById('page-quiz').classList.remove('hidden');
            renderQuestion();
        };

        function renderQuestion() {
            let q = questions[current];
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('progress').innerText = `سؤال ${current + 1} من 20`;
            let html = "";
            q.a.forEach((opt, i) => { 
                html += `<button class="option-btn" onclick="checkAns(${i})">${opt}</button>`; 
            });
            document.getElementById('optionsContainer').innerHTML = html;
        }

        window.checkAns = (i) => {
            if (i === questions[current].c) score++;
            current++;
            if (current < questions.length) renderQuestion(); else finish();
        };

        function finish() {
            document.getElementById('page-quiz').classList.add('hidden');
            document.getElementById('page-result').classList.remove('hidden');
            document.getElementById('finalScore').innerText = `${score} / 20`;
            push(ref(db, 'leaderboard'), { name: name, score: score });
        }

        window.showLeaderboard = () => {
            document.getElementById('page-start').classList.add('hidden');
            document.getElementById('page-leaderboard').classList.remove('hidden');
            const qRef = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10));
            onValue(qRef, (snapshot) => {
                let html = "";
                let rows = [];
                snapshot.forEach(c => { rows.push(c.val()); });
                rows.sort((a,b) => b.score - a.score);
                rows.forEach(r => { html += `<tr><td>${r.name}</td><td>${r.score}</td></tr>`; });
                document.getElementById('leaderboardBody').innerHTML = html || "<tr><td colspan='2'>لا يوجد نتائج</td></tr>";
            });
        };
    </script>
</body>
</html>
